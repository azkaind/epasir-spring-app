# ============================================
# APPLICATION CONFIGURATION
# ============================================
spring.application.name=spring-security-demo

# ============================================
# DATABASE - POSTGRESQL
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/security_db
spring.datasource.username=postgres
spring.datasource.password=kalenderazlita
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================
# JWT CONFIGURATION
# ============================================
app.jwt.secret=7a9b2c4d6e8f1a3b5c7d9e2f4a6b8c1d3e5f7a9b2c4d6e8f1a3b5c7d9e2f4a6b
app.jwt.access-token-expiration=900000
# 15 menit = 900.000 ms
app.jwt.refresh-token-expiration=604800000
# 7 hari = 604.800.000 ms

# ============================================
# SECURITY CONFIGURATION
# ============================================
app.security.max-login-attempts=5
app.security.lockout-duration-minutes=15
app.security.password-min-length=8

# ============================================
# LOGGING
# ============================================
logging.level.com.example.security=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================
# ACTUATOR
# ============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
