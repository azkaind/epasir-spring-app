# ============================================
# APPLICATION CONFIGURATION
# ============================================
spring.application.name=spring-security-demo

# ============================================
# DATABASE - POSTGRESQL
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/security_db
spring.datasource.username=postgres
spring.datasource.password=kalenderazlita
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# ACTUATOR & MONITORING (MICROMETER / PROMETHEUS)
# ============================================
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.metrics.web.server.request.autotime.enabled=true
management.metrics.tags.application=epasir-spring-app
# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=20
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.max-lifetime=1800000

# Aktifkan Virtual Threads Java 21 (gratis, 1 baris):
spring.threads.virtual.enabled=true

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================
# JWT CONFIGURATION
# ============================================
app.jwt.secret=7a9b2c4d6e8f1a3b5c7d9e2f4a6b8c1d3e5f7a9b2c4d6e8f1a3b5c7d9e2f4a6b
app.jwt.access-token-expiration=900000
# 15 menit = 900.000 ms
app.jwt.refresh-token-expiration=604800000
# 7 hari = 604.800.000 ms

# ============================================
# SECURITY CONFIGURATION
# ============================================
app.security.max-login-attempts=5
app.security.lockout-duration-minutes=15
app.security.password-min-length=8

# ============================================
# LOGGING
# ============================================
logging.level.com.example.security=INFO
logging.level.com.example.security.repository=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.jdbc.core=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# (Removed duplicate actuator configs)

# ============================================
# FILE STORAGE
# ============================================
app.file.base-dir=./storage
app.file.bukti-transfer-dir=bukti-transfer
app.file.template-excel-dir=template-excel
app.file.max-size-mb=5

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

